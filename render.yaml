services:
  # ─── Backend (Express API) ─────────────────────────
  - type: web
    name: ai-hub-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: GEMINI_API_KEY
        sync: false # you'll set this manually in Render dashboard
      - key: PORT
        value: 3001

  # ─── Frontend (Vite Static Site) ───────────────────
  - type: static
    name: ai-hub-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false # you'll set this to your backend URL
